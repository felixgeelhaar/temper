name: Security

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Sunday 03:00 UTC — catches new advisories without
    # waiting for the next push.
    - cron: '0 3 * * 0'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write # nox annotate

jobs:
  nox-scan:
    name: Nox security scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install nox (pinned + sha256-verified binary)
        env:
          NOX_VERSION: "1.7.0"
          # SHA-256 of nox_1.7.0_linux_amd64.tar.gz. Pinning the checksum makes
          # the download tamper-evident: the gate never runs an unexpected
          # binary. Bump this deliberately, not transitively.
          NOX_SHA256: "d4ddb89b07c68e767453518ba7358a5c9786ca93f0995143277426de208d4645"
        run: |
          set -euo pipefail
          curl -sL -o nox.tar.gz \
            "https://github.com/nox-hq/nox/releases/download/v${NOX_VERSION}/nox_${NOX_VERSION}_linux_amd64.tar.gz"
          echo "${NOX_SHA256}  nox.tar.gz" | sha256sum -c -
          tar xzf nox.tar.gz && sudo mv nox /usr/local/bin/ && nox version

      - name: Scan
        # nox 1.7.0 auto-discovers the committed .nox/baseline.json (the
        # explicit -baseline flag was removed in 1.7.0). Release binaries exit
        # non-zero on any unsuppressed finding; the gate step below decides what
        # is actually fatal (net-new critical/high not already baselined).
        run: nox scan . -format json,sarif -output nox-results || true

      - name: Upload SARIF to code scanning
        if: always() && hashFiles('nox-results/findings.sarif') != ''
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: nox-results/findings.sarif

      - name: Annotate PR with new findings
        if: github.event_name == 'pull_request' && hashFiles('nox-results/findings.json') != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: nox annotate -input nox-results/findings.json || true

      - name: Gate on net-new critical/high findings
        # temper commits .nox/baseline.json, so this enforces net-new
        # critical/high — findings NOT already in the baseline. Refresh with
        # `nox baseline add` (or `nox baseline update`) when accepting new ones.
        if: always() && hashFiles('nox-results/findings.json') != ''
        run: |
          f=nox-results/findings.json
          baselined=$(jq '[.findings[]? | select(.Status=="baselined")] | length' "$f" 2>/dev/null || echo 0)
          new=$(jq '[.findings[]? | select((.Severity=="critical" or .Severity=="high") and (.Status!="baselined"))] | length' "$f" 2>/dev/null || echo 0)
          echo "net-new critical/high: $new (baselined findings: $baselined)"
          # Self-adjusting (matches the central workflow): enforce only once the
          # 1.7.0 baseline is established (some finding marked "baselined"). The
          # existing baseline predates 1.7.0's Status field, so the first run is
          # report-only until 'nox baseline update' refreshes .nox/baseline.json.
          if [ "$baselined" -eq 0 ]; then
            echo "::notice::No baselined findings under nox 1.7.0 — security gate is report-only. Run 'nox baseline update' and commit .nox/ to enforce net-new critical/high."
            exit 0
          fi
          if [ "$new" -gt 0 ]; then
            echo "::error::Net-new critical/high findings. Run 'nox baseline add' or remediate."
            jq '.findings[] | select((.Severity=="critical" or .Severity=="high") and (.Status!="baselined")) | {severity:.Severity, rule:.RuleID, file:.Location.FilePath, line:.Location.StartLine}' "$f"
            exit 1
          fi
          echo "No net-new critical/high findings."
