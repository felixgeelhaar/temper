# nox configuration — the security/dependency gate that replaces dependabot.
# Supersedes the old .noxignore (nox 1.7.x reads scan.exclude here, not the
# gitignore-style .noxignore file).
# Schema reference: https://github.com/nox-hq/nox
#
# Only GENERATED, VENDORED, or PROSE/DATA artifacts are excluded here. All
# first-party Go source — including *_test.go — is scanned. The remaining
# first-party findings (fake credentials in test/demo fixtures, an OIDC
# permission scope misread as a token, a teaching-exercise fixture, and a
# mutable action-tag pin owned by nox-remediate) are documented false
# positives / accepted risks recorded in .nox/baseline.json, never by
# blinding whole source directories.

scan:
  exclude:
    # Go module checksum database — SHA-256 module digests read as high-entropy
    # secrets/API keys to the entropy detector. Real dependency CVEs are
    # surfaced via OSV lookups on go.mod, not go.sum text.
    # Classification: False Positive (module digests). Last reviewed: 2026-07-11
    - go.sum
    - "**/go.sum"
    # npm lockfiles (web/ Astro docs site, editors/vscode/ extension): sha512
    # integrity hashes false-match imported "Detected X API Key" secret
    # patterns. These are public deterministic hashes, not credentials.
    # Dependency CVEs are still surfaced via OSV directly, not lockfile text.
    # Classification: False Positive (integrity hashes). Last reviewed: 2026-07-11
    - "**/package-lock.json"
    - "**/yarn.lock"
    - "**/pnpm-lock.yaml"
    # Markdown is prose — README and docs/. The secret/PII entropy rules fire on
    # ordinary documentation. High-confidence real secret patterns are still
    # caught in code, not prose.
    # Classification: False Positive (prose). Last reviewed: 2026-07-11
    - "*.md"
    - "**/*.md"
    # nox's own baseline/cache and report output — finding fingerprints are
    # SHA-256 hex that re-trip the secret detector. Never scan the scanner.
    # Classification: Acceptable Pattern (scanner state). Last reviewed: 2026-07-11
    - .nox/
    - nox-results/
    - findings.json
    - "**/*.sarif"
